その庭園では、花も草木もすべて歯車でできていました。

朝露の代わりに油が滴り、風が吹くとカチカチという心地よい金属音が響きます。庭師の男は、毎日巨大なゼンマイを巻いて回ります。

「明日は、赤い薔薇を咲かせよう」

男がレバーを引くと、カシャリと音を立てて金属の花びらが開きました。そこには、命ある花にはない、永遠の美しさがありました。

しかし、男は知っていました。
この完璧な庭園に足りないのは、枯れるという切なさなのだと。
