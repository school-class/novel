一年中雪が降り続く北の町に、腕の良いキャンドル職人が住んでいました。

彼が作るキャンドルは、灯すと温かいだけでなく、大切な人の声を思い出させてくれるという噂がありました。

「冬の長い夜に、少しでも心が休まるように」

職人は一つ一つ丁寧に蝋を固め、芯を整えます。
彼の工房には、いつも優しいオレンジ色の光が満ちていました。

クリスマスの前夜、一人の老紳士が訪ねてきました。
「亡くなった妻の声が聞きたいんだ。彼女が最後に言いたかったことを、私は聞き逃してしまったから」
