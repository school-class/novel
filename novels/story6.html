        <article class="novel-content">
祭りの夜、人混みから少し離れた路地裏に、不思議な露店が出ていました。

店主はマントを深く被り、銀色の秤で何かを量っています。

「いらっしゃい。今夜はどんな夢をご希望かな？」

並べられた瓶の中には、色とりどりの煙が揺らめいています。
空を飛ぶ夢、昔の恋人に会う夢、英雄になる夢。

一人の少年が、一番小さな瓶を指差しました。
「これは何の夢？」

店主は不敵に笑いました。
「それは『明日が楽しみになる夢』だよ。代金は、君の『今日あった嫌なこと』でいい」
