        <article class="novel-content">
海の底、クジラたちの歌声が響くホールがありました。

そこでは魚たちが楽器を持ち寄り、一晩中音楽を奏でています。クラゲは光りながらリズムを刻み、イワシの群れは波のような旋律を作り出します。

指揮を執るのは、齢数百年の大亀です。

地上では決して聞くことのできない、重厚で静かな響き。それは母なる海の鼓動そのものでした。

満月の夜、海面に耳を澄ませてみてください。
微かに聞こえる地響きのような音は、彼らのアンサンブルかもしれません。
