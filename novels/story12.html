真夜中の廃校。
誰もいないはずの音楽室から、微かなメロディが聞こえてきました。

好奇心に駆られた若者たちが部屋に入ると、埃を被ったオルゴールが勝手に回っています。

「おい、やめろよ…」

一人が手を伸ばしてオルゴールを止めようとした瞬間。
音楽が不気味に低くなり、背後のドアがバタンと閉まりました。

窓ガラスに映る自分たちの影。
その影が、自分たちとは違う動きをしていました。
