森の奥深く、誰も知らない場所に「青い鳥の郵便局」はあります。

ここでは、届かなかった手紙や、出すのを諦めた想いを受け付けています。局長の青い鳥は、小さな嘴で手紙を預かると、それを虹色の封筒に入れ替えます。

ある日、一人の少女がやってきました。
彼女の手には、少し黄ばんだ封筒が握られていました。

「これは、天国のおばあちゃんに宛てた手紙です。でも、住所がわからなくて」

青い鳥は優しく羽を羽ばたかせ、少女の肩に止まりました。
「住所はいりませんよ。想いがあれば、必ず届きます」
