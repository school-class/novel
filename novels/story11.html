雲の上には、巨大なクジラが泳いでいます。

その背中には小さな街があり、人々は風と共に暮らしていました。

「今日は東の風が強いね」

風車守りの少年は、クジラのヒレの動きを見て、その日の天候を読み取ります。
彼らの目的地は、まだ誰も見たことのない「最果ての島」。

クジラの鳴き声が、どこまでも広がる空に響き渡ります。
