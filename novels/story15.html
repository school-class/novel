「看板メニューは、思い出のナポリタンです」

シェフの男が腕を振るうと、どこか懐かしい香りが広がります。

一口食べると、人々は忘れていた子供の頃の夏休みや、初恋の味を思い出します。

「ごちそうさま。なんだか、明日からまた頑張れそうです」

ワゴンは夕暮れと共に、また次の街へと走り出します。
