ある日、天界の神様が言いました。

「最近働きすぎた。有給休暇をとることにしたぞ」

神様は人間の姿になり、下界の商店街に降りてきました。
鯛焼きを食べ、パチンコをし、近所のおじさんと将棋を指す神様。

「おい、おっちゃん。あんた意外と強いな」

神様が休んでいる間、世界は意外にも平和でした。
たまには、神様も休まないとね。
