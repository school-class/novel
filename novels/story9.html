視界を埋め尽くすのは、0と1の奔流。

「ここはどこだ？」

少年は自分の名前さえ思い出せませんでした。
目の前に現れたのは、電子の妖精。

「あなたは、アクセス権のない領域に侵入しました。消去される前に、ログアウトしてください」

しかし、出口はどこにもありません。
少年は、この仮想世界に隠された「真実」を探す旅に出ます。
