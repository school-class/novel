戦国の世、刀一本で生きてきた男がいました。

彼の名は源次郎。数多の戦場を駆け抜け、その手は血で汚れていました。

ある日、荒れ果てた寺の境内に、一輪のひまわりが咲いているのを見つけました。

「こんな場所によく咲いたものだ」

源次郎は刀を置き、その花に水をやりました。
殺伐とした日々の中で、その鮮やかな黄色は、彼が忘れていた「生」の輝きを思い出させてくれました。
