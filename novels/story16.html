「10年後の今日、ここでまた会おう」

卒業式の午後、舞い散る桜の下で交わした幼い約束。

私は大人になり、忙しい日々の中でその約束を忘れかけていました。

しかし、4月の風が吹いた瞬間、あの人の笑顔が脳裏に浮かびました。
急いで向かった並木道。そこには、背が高くなった彼が立っていました。
