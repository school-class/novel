「今宵、女神の涙をいただきに参ります」

予告状が届いたのは、厳重な警備を誇る国立美術館。

満月の夜、警備員たちが目を光らせる中、煙と共に現れたのはシルクハットの男。

「無駄ですよ、警部。私の足跡を追うことはできません」

鮮やかな手口で宝石を盗み出し、彼は夜の空へ消えていきました。
