        <article class="novel-content">
ある静かな夜のことでした。

少年は一人、丘の上を目指して歩いていました。空には数えきれないほどの星が輝き、まるで地上に降り注いでくるかのようです。

「今夜は特に綺麗だね」

少年は誰に言うともなく呟きました。
足元の草が夜露に濡れて、月の光を反射しています。

丘の頂上に着くと、そこには一本の大きな樫の木が立っていました。その木の下には、銀色の毛並みを持った一匹の狐が座っていました。

狐は少年を見ると、静かに目を細めて言いました。

「待っていたよ、星の導きを求めてきた少年」
