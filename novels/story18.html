その森の木々は、エメラルドの葉をつけ、サファイアの実を結びます。

しかし、一歩でも足を踏み入れれば、森の呪いで石になってしまうと言われていました。

森を守るのは、一人の少女。
彼女は宝石を欲しがる欲深い人間たちを、霧を使って追い払います。

「ここにあるのは富ではなく、世界の記憶なの」

少女がルビーの花に触れると、遠い昔の太陽の温もりが森中に広がりました。
