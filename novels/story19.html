ロンドンの片隅、常に深い霧に包まれた街。

そこには、どんな難事件も解決するという探偵がいました。

「今回の依頼は、盗まれた『声』を取り戻すことですね」

探偵はパイプをくゆらせ、依頼人の少女を見つめました。
少女は口を動かしますが、音は一つも出ません。

犯人は、影を操る怪人。
霧の中から、真実を暴き出す戦いが始まります。
