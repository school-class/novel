普通の公立高校の、開かずの教室。

そこは放課後になると「魔法教室」に変わります。

「先生、浮遊の魔法がうまくいきません」

眼鏡をかけた厳しい先生が、杖を振って見せました。
「もっとイメージを強く持ちなさい。自分を羽だと思いなさい」

数学や英語の授業の裏側で、密かに行われている魔法のレッスン。
卒業までに、彼らはどんな奇跡を身につけるのでしょうか。
