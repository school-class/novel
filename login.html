<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - Surge小説</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-form { max-width: 400px; margin: 4rem auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .auth-form h2 { text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; }
        .form-group input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-auth { width: 100%; padding: 1rem; background: var(--accent-color); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .error-message { color: red; margin-bottom: 1rem; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo"><a href="index.html" style="color: inherit;"><h1>Surge小説</h1></a></div>
        </div>
    </header>

    <main class="container">
        <div class="auth-form">
            <h2>ログイン</h2>
            <div id="errorMessage" class="error-message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-auth">ログイン</button>
            </form>
            <p style="text-align: center; margin-top: 1rem;">
                アカウントをお持ちでない方は <a href="signup.html">新規登録</a>
            </p>
        </div>
    </main>

    <script type="module">
        import { auth, signInWithEmailAndPassword } from './js/firebase-config.js';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                // For backward compatibility with other pages using localStorage
                localStorage.setItem('surge_user', JSON.stringify({
                    email: user.email,
                    nickname: user.displayName || '名無しさん'
                }));
                window.location.href = 'index.html';
            } catch (error) {
                console.error("Login Error:", error);
                errorDiv.textContent = 'ログインに失敗しました。メールアドレスまたはパスワードが正しくありません。';
            }
        });
    </script>
</body>
</html>
