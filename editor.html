<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小説エディタ - Surge小説</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .editor-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .toolbar { display: flex; gap: 0.5rem; padding: 0.5rem; background: #f0f0f0; border: 1px solid #ddd; border-bottom: none; border-radius: 4px 4px 0 0; }
        .toolbar button { padding: 0.3rem 0.6rem; cursor: pointer; border: 1px solid #ccc; background: white; border-radius: 3px; font-size: 0.8rem; }
        #novelContent { width: 100%; min-height: 400px; padding: 1rem; border: 1px solid #ddd; border-radius: 0 0 4px 4px; box-sizing: border-box; font-size: 1.1rem; line-height: 1.8; outline: none; }
        .editor-meta { margin-bottom: 1rem; }
        .editor-meta input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1.2rem; font-weight: bold; box-sizing: border-box; }
        .editor-meta select { margin-top: 0.5rem; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
        .save-bar { margin-top: 1rem; display: flex; gap: 1rem; justify-content: flex-end; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;"><h1>Surge小説</h1></a></div>
        </div>
    </header>

    <main class="container">
        <div class="main-content" style="flex: 1;">
            <div class="editor-container">
                <div class="editor-meta">
                    <input type="text" id="novelTitle" placeholder="タイトルを入力">
                    <select id="novelGenre">
                        <option value="幻想">幻想</option>
                        <option value="SF">SF</option>
                        <option value="現代ドラマ">現代ドラマ</option>
                        <option value="ミステリー">ミステリー</option>
                        <option value="短編">短編</option>
                    </select>
                </div>

                <div class="toolbar">
                    <button type="button" onclick="execCmd('bold')"><b>B</b></button>
                    <button type="button" onclick="execCmd('fontSize', '5')">大</button>
                    <button type="button" onclick="execCmd('fontSize', '3')">中</button>
                    <button type="button" onclick="execCmd('fontSize', '1')">小</button>
                    <button type="button" onclick="execCmd('foreColor', 'red')">赤</button>
                    <button type="button" onclick="execCmd('removeFormat')">クリア</button>
                </div>
                <div id="novelContent" contenteditable="true"></div>

                <div class="save-bar">
                    <button class="btn-secondary" onclick="window.location.href='mypage.html'">キャンセル</button>
                    <button class="btn-secondary" onclick="downloadWork()">GitHub用に出力 (HTML)</button>
                    <button class="btn-primary" onclick="saveWork()">投稿する</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, onAuthStateChanged } from './js/firebase-config.js';

        let editIndex = null;
        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;

            const urlParams = new URLSearchParams(window.location.search);
            const edit = urlParams.get('edit');
            if (edit !== null) {
                editIndex = parseInt(edit);
                const allWorks = JSON.parse(localStorage.getItem('surge_user_works_v2')) || {};
                const works = allWorks[user.email] || [];
                const work = works[editIndex];
                if (work) {
                    document.getElementById('novelTitle').value = work.title;
                    document.getElementById('novelGenre').value = work.genre;
                    // For rich text, we use innerHTML but it was saved from contenteditable
                    document.getElementById('novelContent').innerHTML = work.content;
                    document.querySelector('.btn-primary').textContent = '更新する';
                }
            }
        });

        window.execCmd = function(command, value = null) {
            document.execCommand(command, false, value);
        }

        window.saveWork = function() {
            const title = document.getElementById('novelTitle').value;
            const genre = document.getElementById('novelGenre').value;
            const content = document.getElementById('novelContent').innerHTML;

            if (!title || !content.trim() || content === '<br>') {
                alert('タイトルと本文を入力してください。');
                return;
            }

            if (!currentUser) return;

            const allWorks = JSON.parse(localStorage.getItem('surge_user_works_v2')) || {};
            if (!allWorks[currentUser.email]) allWorks[currentUser.email] = [];
            const works = allWorks[currentUser.email];

            const workData = {
                title,
                genre,
                content,
                author: currentUser.displayName || currentUser.email,
                date: new Date().toLocaleDateString('ja-JP')
            };

            if (editIndex !== null) {
                works[editIndex] = workData;
            } else {
                works.push(workData);
            }

            allWorks[currentUser.email] = works;
            localStorage.setItem('surge_user_works_v2', JSON.stringify(allWorks));
            alert('投稿が完了しました！トップページやマイページで確認できます。');
            window.location.href = 'mypage.html';
        }

        window.downloadWork = function() {
            const title = document.getElementById('novelTitle').value;
            const content = document.getElementById('novelContent').innerHTML;

            if (!title || !content.trim()) {
                alert('タイトルと本文を入力してください。');
                return;
            }

            const htmlContent = `
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>${title} - Surge小説</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .content { white-space: pre-wrap; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>${title}</h1>
    <div class="content">${content}</div>
</body>
</html>`;

            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${title}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
