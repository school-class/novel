<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ - Surge小説</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-card { background: white; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; display: flex; align-items: center; gap: 2rem; }
        .avatar { width: 80px; height: 80px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .work-item { border-bottom: 1px solid #eee; padding: 1rem 0; display: flex; justify-content: space-between; align-items: center; }
        .btn-edit { font-size: 0.8rem; padding: 0.3rem 0.8rem; background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; }
        .tab-nav { display: flex; gap: 1rem; margin-bottom: 1rem; border-bottom: 1px solid #eee; }
        .tab-btn { padding: 0.5rem 1rem; cursor: pointer; border: none; background: none; font-weight: bold; color: #666; }
        .tab-btn.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;"><h1>Surge小説</h1></a></div>
            <nav class="top-nav">
                <ul>
                    <li><a href="genre.html">ジャンル</a></li>
                    <li><a href="ranking.html">ランキング</a></li>
                    <li><a href="editor.html">新規投稿</a></li>
                </ul>
            </nav>
            <div class="user-nav" style="margin-left: auto;">
                <button id="logoutBtn" style="background:none; border:none; color:var(--text-muted); cursor:pointer;">ログアウト</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="main-content">
            <div class="profile-card">
                <div class="avatar">👤</div>
                <div>
                    <h2 id="userNickname" style="margin:0;">読み込み中...</h2>
                    <p style="color:#666; margin:0;">Surge小説 会員</p>
                </div>
            </div>

            <div class="tab-nav">
                <button class="tab-btn active" onclick="showTab('works')">自分の作品</button>
                <button class="tab-btn" onclick="showTab('likes')">いいねした作品</button>
                <button class="tab-btn" onclick="showTab('follows')">フォロー中</button>
            </div>

            <div id="works" class="tab-content active">
                <section class="section">
                    <div class="section-header">
                        <h2>投稿済みの作品</h2>
                        <a href="editor.html" class="btn-primary" style="font-size: 0.8rem; padding: 0.5rem 1rem;">新規作成</a>
                    </div>
                    <div id="myWorksList">
                        <p>まだ作品がありません。</p>
                    </div>
                </section>
            </div>

            <div id="likes" class="tab-content">
                <section class="section">
                    <div class="section-header">
                        <h2>いいねした作品</h2>
                    </div>
                    <div id="myLikesList">
                        <p>まだいいねした作品がありません。</p>
                    </div>
                </section>
            </div>

            <div id="follows" class="tab-content">
                <section class="section">
                    <div class="section-header">
                        <h2>フォロー中の作者</h2>
                    </div>
                    <div id="myFollowsList">
                        <p>まだフォローしている作者がいません。</p>
                    </div>
                </section>
            </div>
        </div>

        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>ステータス</h3>
                <ul style="list-style:none; padding:0; font-size:0.9rem;">
                    <li style="margin-bottom:0.5rem;">投稿数: <span id="workCount">0</span></li>
                    <li style="margin-bottom:0.5rem;">いいね受取数: 0</li>
                    <li>フォロー中: <span id="followCount">0</span></li>
                </ul>
            </div>
        </aside>
    </main>

    <script type="module">
        import { auth, onAuthStateChanged, signOut } from './js/firebase-config.js';

        window.showTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            onAuthStateChanged(auth, (user) => {
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }
                const userEmail = user.email;
                document.getElementById('userNickname').textContent = user.displayName || user.email;

                // 1. Own Works
                const allWorks = JSON.parse(localStorage.getItem('surge_user_works_v2')) || {};
                const works = allWorks[userEmail] || [];
                const worksList = document.getElementById('myWorksList');
                document.getElementById('workCount').textContent = works.length;

                if (works.length > 0) {
                    worksList.innerHTML = '';
                    works.forEach((work, index) => {
                        const div = document.createElement('div');
                        div.className = 'work-item';
                        div.innerHTML = `<div><strong style="font-size:1.1rem;">${work.title}</strong><p style="margin:0; font-size:0.8rem; color:#666;">投稿日: ${work.date}</p></div><a href="editor.html?edit=${index}" class="btn-edit">編集する</a>`;
                        worksList.appendChild(div);
                    });
                }

                // 2. Likes
                const likes = JSON.parse(localStorage.getItem(`surge_likes_${userEmail}`)) || [];
                const likesList = document.getElementById('myLikesList');
                if (likes.length > 0) {
                    likesList.innerHTML = '<ul>' + likes.map(id => `<li>${id}</li>`).join('') + '</ul>';
                }

                // 3. Follows
                const follows = JSON.parse(localStorage.getItem(`surge_follows_${userEmail}`)) || [];
                const followsList = document.getElementById('myFollowsList');
                document.getElementById('followCount').textContent = follows.length;
                if (follows.length > 0) {
                    followsList.innerHTML = '<ul>' + follows.map(name => `<li>${name}</li>`).join('') + '</ul>';
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', () => {
                signOut(auth).then(() => {
                    localStorage.removeItem('surge_user');
                    window.location.href = 'index.html';
                });
            });
        });
    </script>
</body>
</html>
