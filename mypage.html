<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ - Surge小説</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-card { background: white; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; display: flex; align-items: center; gap: 2rem; }
        .avatar { width: 80px; height: 80px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .work-item { border-bottom: 1px solid #eee; padding: 1rem 0; display: flex; justify-content: space-between; align-items: center; }
        .btn-edit { font-size: 0.8rem; padding: 0.3rem 0.8rem; background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;"><h1>Surge小説</h1></a></div>
            <nav class="top-nav">
                <ul>
                    <li><a href="genre.html">ジャンル</a></li>
                    <li><a href="ranking.html">ランキング</a></li>
                    <li><a href="editor.html">新規投稿</a></li>
                </ul>
            </nav>
            <div class="user-nav" style="margin-left: auto;">
                <button id="logoutBtn" style="background:none; border:none; color:var(--text-muted); cursor:pointer;">ログアウト</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="main-content">
            <div class="profile-card">
                <div class="avatar">👤</div>
                <div>
                    <h2 id="userNickname" style="margin:0;">読み込み中...</h2>
                    <p style="color:#666; margin:0;">Surge小説 プレミアム会員</p>
                </div>
            </div>

            <section class="section">
                <div class="section-header">
                    <h2>投稿済みの作品</h2>
                    <a href="editor.html" class="btn-primary" style="font-size: 0.8rem; padding: 0.5rem 1rem;">新規作成</a>
                </div>
                <div id="myWorksList">
                    <p id="noWorksMsg">まだ作品がありません。</p>
                </div>
            </section>
        </div>

        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>ステータス</h3>
                <ul style="list-style:none; padding:0; font-size:0.9rem;">
                    <li style="margin-bottom:0.5rem;">投稿数: <span id="workCount">0</span></li>
                    <li style="margin-bottom:0.5rem;">合計ポイント: 0 pt</li>
                    <li>フォロワー: 0</li>
                </ul>
            </div>
        </aside>
    </main>

    <script type="module">
        import { auth, onAuthStateChanged, signOut } from './js/firebase-config.js';

        document.addEventListener('DOMContentLoaded', () => {
            onAuthStateChanged(auth, (user) => {
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }
                document.getElementById('userNickname').textContent = user.displayName || user.email;

                // Load works specific to this user email to provide basic data isolation in localStorage
                const allWorks = JSON.parse(localStorage.getItem('surge_user_works_v2')) || {};
                const works = allWorks[user.email] || [];
                const list = document.getElementById('myWorksList');
                document.getElementById('workCount').textContent = works.length;

                if (works.length > 0) {
                    list.innerHTML = '';
                    works.forEach((work, index) => {
                        const div = document.createElement('div');
                        div.className = 'work-item';

                        const infoDiv = document.createElement('div');
                        const titleStrong = document.createElement('strong');
                        titleStrong.style.fontSize = '1.1rem';
                        titleStrong.textContent = work.title; // Safe: textContent

                        const dateP = document.createElement('p');
                        dateP.style.margin = '0';
                        dateP.style.fontSize = '0.8rem';
                        dateP.style.color = '#666';
                        dateP.textContent = `投稿日: ${work.date}`;

                        infoDiv.appendChild(titleStrong);
                        infoDiv.appendChild(dateP);

                        const editLink = document.createElement('a');
                        editLink.href = `editor.html?edit=${index}`;
                        editLink.className = 'btn-edit';
                        editLink.textContent = '編集する';

                        div.appendChild(infoDiv);
                        div.appendChild(editLink);
                        list.appendChild(div);
                    });
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', () => {
                signOut(auth).then(() => {
                    localStorage.removeItem('surge_user');
                    window.location.href = 'index.html';
                });
            });
        });
    </script>
</body>
</html>
