<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ - Surge小説</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-card { background: white; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; display: flex; align-items: center; gap: 2rem; }
        .avatar { width: 80px; height: 80px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .work-item { border-bottom: 1px solid #eee; padding: 1rem 0; display: flex; justify-content: space-between; align-items: center; }
        .btn-edit { font-size: 0.8rem; padding: 0.3rem 0.8rem; background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo"><a href="index.html" style="color: inherit;"><h1>Surge小説</h1></a></div>
            <nav class="top-nav">
                <ul>
                    <li><a href="genre.html">ジャンル</a></li>
                    <li><a href="ranking.html">ランキング</a></li>
                    <li><a href="editor.html">新規投稿</a></li>
                </ul>
            </nav>
            <div class="user-nav" style="margin-left: auto;">
                <button onclick="logout()" style="background:none; border:none; color:var(--text-muted); cursor:pointer;">ログアウト</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="main-content">
            <div class="profile-card">
                <div class="avatar">👤</div>
                <div>
                    <h2 id="userNickname" style="margin:0;">読み込み中...</h2>
                    <p style="color:#666; margin:0;">Surge小説 プレミアム会員</p>
                </div>
            </div>

            <section class="section">
                <div class="section-header">
                    <h2>投稿済みの作品</h2>
                    <a href="editor.html" class="btn-primary" style="font-size: 0.8rem; padding: 0.5rem 1rem;">新規作成</a>
                </div>
                <div id="myWorksList">
                    <p id="noWorksMsg">まだ作品がありません。</p>
                </div>
            </section>
        </div>

        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>ステータス</h3>
                <ul style="list-style:none; padding:0; font-size:0.9rem;">
                    <li style="margin-bottom:0.5rem;">投稿数: <span id="workCount">0</span></li>
                    <li style="margin-bottom:0.5rem;">合計ポイント: 0 pt</li>
                    <li>フォロワー: 0</li>
                </ul>
            </div>
        </aside>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('surge_user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('userNickname').textContent = user.nickname;

            const works = JSON.parse(localStorage.getItem('surge_user_works')) || [];
            const list = document.getElementById('myWorksList');
            document.getElementById('workCount').textContent = works.length;

            if (works.length > 0) {
                list.innerHTML = '';
                works.forEach((work, index) => {
                    const div = document.createElement('div');
                    div.className = 'work-item';
                    div.innerHTML = `
                        <div>
                            <strong style="font-size:1.1rem;">${work.title}</strong>
                            <p style="margin:0; font-size:0.8rem; color:#666;">投稿日: ${work.date}</p>
                        </div>
                        <a href="editor.html?edit=${index}" class="btn-edit">編集する</a>
                    `;
                    list.appendChild(div);
                });
            }
        });

        function logout() {
            localStorage.removeItem('surge_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
