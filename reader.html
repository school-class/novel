<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品閲覧 - Surge小説</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .novel-meta-box { background: white; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border-left: 4px solid var(--accent-color); }
        .novel-meta-box p { margin: 0.5rem 0; color: #666; }
        .social-actions { display: flex; gap: 1rem; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;"><h1>Surge小説</h1></a></div>
            <nav class="top-nav">
                <ul>
                    <li><a href="genre.html">ジャンル</a></li>
                    <li><a href="ranking.html">ランキング</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <article class="novel-container">
            <div class="novel-meta-box">
                <h1 id="displayTitle" style="margin-top:0;">読み込み中...</h1>
                <p>ジャンル：<span id="displayGenre">-</span> | 作者：<span id="displayAuthor">-</span> | 投稿日：<span id="displayDate">-</span></p>
            </div>

            <div id="displayContent" class="novel-content">
                <!-- Content will be injected here -->
            </div>

            <div class="social-actions">
                <button id="likeBtn" class="btn-secondary">❤ いいね</button>
                <button id="followBtn" class="btn-secondary">フォローする</button>
            </div>

            <div style="margin-top: 2rem; text-align: center;">
                <a href="index.html">← 作品一覧に戻る</a>
            </div>
        </article>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <p>&copy; 2026 Surge小説 Inc.</p>
        </div>
    </footer>

    <script type="module">
        import { auth, onAuthStateChanged } from './js/firebase-config.js';

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const user = params.get('user');
            const id = params.get('id');

            if (!user || id === null) {
                document.getElementById('displayContent').innerHTML = '<p>作品が見つかりませんでした。</p>';
                return;
            }

            const allWorks = JSON.parse(localStorage.getItem('surge_user_works_v2')) || {};
            const userWorks = allWorks[user] || [];
            const work = userWorks[parseInt(id)];

            if (work) {
                document.title = `${work.title} - Surge小説`;
                document.getElementById('displayTitle').textContent = work.title;
                document.getElementById('displayGenre').textContent = work.genre;
                document.getElementById('displayAuthor').textContent = work.author;
                document.getElementById('displayDate').textContent = work.date;
                document.getElementById('displayContent').innerHTML = work.content;

                // Social logic (simplified for dynamic reader)
                const likeBtn = document.getElementById('likeBtn');
                const followBtn = document.getElementById('followBtn');

                onAuthStateChanged(auth, (loggedUser) => {
                    if (loggedUser) {
                        const userEmail = loggedUser.email;
                        const likesKey = `surge_likes_${userEmail}`;
                        const followsKey = `surge_follows_${userEmail}`;

                        let likes = JSON.parse(localStorage.getItem(likesKey)) || [];
                        if (likes.includes(work.title)) {
                            likeBtn.textContent = '❤ いいね済み';
                            likeBtn.style.color = 'var(--accent-color)';
                        }

                        likeBtn.onclick = () => {
                            likes = JSON.parse(localStorage.getItem(likesKey)) || [];
                            if (likes.includes(work.title)) {
                                likes = likes.filter(t => t !== work.title);
                                likeBtn.textContent = '❤ いいね';
                                likeBtn.style.color = 'inherit';
                            } else {
                                likes.push(work.title);
                                likeBtn.textContent = '❤ いいね済み';
                                likeBtn.style.color = 'var(--accent-color)';
                            }
                            localStorage.setItem(likesKey, JSON.stringify(likes));
                        };

                        let follows = JSON.parse(localStorage.getItem(followsKey)) || [];
                        if (follows.includes(work.author)) {
                            followBtn.textContent = 'フォロー中';
                        }

                        followBtn.onclick = () => {
                            follows = JSON.parse(localStorage.getItem(followsKey)) || [];
                            if (follows.includes(work.author)) {
                                follows = follows.filter(a => a !== work.author);
                                followBtn.textContent = 'フォローする';
                            } else {
                                follows.push(work.author);
                                followBtn.textContent = 'フォロー中';
                            }
                            localStorage.setItem(followsKey, JSON.stringify(follows));
                        };
                    } else {
                        const loginAlert = () => alert('いいねやフォローにはログインが必要です。');
                        likeBtn.onclick = loginAlert;
                        followBtn.onclick = loginAlert;
                    }
                });
            } else {
                document.getElementById('displayContent').innerHTML = '<p>作品が見つかりませんでした。</p>';
            }
        });
    </script>
</body>
</html>
